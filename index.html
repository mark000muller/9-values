  circle:{label:'a circle',draw:(c,x,y,r)=>{c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.stroke()},start:(x,y,r)=>({x:x+r,y}),check(p){const b=bbox(p);if(b.w<50||b.h<50)return false;const radii=p.map(q=>Math.hypot(q.x-b.cx,q.y-b.cy));return Math.min(b.w,b.h)/Math.max(b.w,b.h)>0.45&&sd(radii)/mean(radii)<0.38&&closure(p)/mean(radii)<1.2&&angT(p)>Math.PI*1.2}},

function mean(a){return a.reduce((s,v)=>s+v,0)/a.length}
function sd(a){const m=mean(a);return Math.sqrt(a.reduce((s,v)=>s+(v-m)**2,0)/a.length)}
function bbox(p){const xs=p.map(q=>q.x),ys=p.map(q=>q.y);const mnX=Math.min(...xs),mxX=Math.max(...xs),mnY=Math.min(...ys),mxY=Math.max(...ys);return{minX:mnX,maxX:mxX,minY:mnY,maxY:mxY,cx:(mnX+mxX)/2,cy:(mnY+mxY)/2,w:mxX-mnX,h:mxY-mnY}}
function closure(p){return Math.hypot(p[0].x-p[p.length-1].x,p[0].y-p[p.length-1].y)}
function angT(p){let t=0,pr=null;const b=bbox(p);for(const q of p){const a=Math.atan2(q.y-b.cy,q.x-b.cx);if(pr!==null){let d=a-pr;if(d>Math.PI)d-=2*Math.PI;if(d<-Math.PI)d+=2*Math.PI;t+=d}pr=a}return Math.abs(t)}
function hexArr(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function hexA(h,a){const[r,g,b]=hexArr(h);return`rgba(${r},${g},${b},${a})`}

// Single ambient track plays on all screens. Mute button toggles it.
let audioMuted=false;
const audioBtn=document.getElementById('audio-toggle');
let _bgSrc=null,_bgGain=null,_bgBuf=null,_bgAC=null;

function getAC(){
  if(!_bgAC)_bgAC=new(window.AudioContext||window.webkitAudioContext)();
  if(_bgAC.state==='suspended')_bgAC.resume();
  return _bgAC;
}

async function // startBgAudio(){
  if(_bgSrc)return; // already playing
  const ac=getAC();
  if(!_bgBuf){
    const bin=null /*audio removed*/;
    const buf=new ArrayBuffer(bin.length);
    const v=new Uint8Array(buf);
    for(let i=0;i<bin.length;i++)v[i]=bin.charCodeAt(i);
    try{ _bgBuf=await ac.decodeAudioData(buf); }catch(e){console.warn('audio decode',e);return;}
  }
  const src=ac.createBufferSource();
  const gain=ac.createGain();
  src.buffer=_bgBuf;src.loop=true;
  src.connect(gain);gain.connect(ac.destination);
  gain.gain.setValueAtTime(audioMuted?0:0.5,ac.currentTime);
  gain.gain.linearRampToValueAtTime(audioMuted?0:0.5,ac.currentTime+0.01);
  src.start();
  _bgSrc=src;_bgGain=gain;
}

function setMuteState(muted){
  audioMuted=muted;
  audioBtn.textContent=muted?'ŌÖ¬ off':'ŌÖ¬ on';
  audioBtn.classList.toggle('muted',muted);
  if(_bgGain){
    const ac=getAC();
    _bgGain.gain.cancelScheduledValues(ac.currentTime);
    _bgGain.gain.setTargetAtTime(muted?0:0.5,ac.currentTime,0.3);
  }
}

audioBtn.addEventListener('click',()=>setMuteState(!audioMuted));

// ŌöĆŌöĆ LOGIN ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
(function(){
  const canvas=document.getElementById('login-canvas');const ctx=canvas.getContext('2d');
  const feedEl=document.getElementById('login-feedback');
  const mysteryEl=document.getElementById('login-mystery');
  let drawPts=[],isDrawing=false,trailFade=1,bp=0;
  let sucAnim=0,sucAnimating=false,failAnim=0,failAnimating=false;
  function setFeed(msg,ok){feedEl.textContent=msg;feedEl.style.color=ok===true?'rgba(140,220,160,0.8)':ok===false?'rgba(255,140,120,0.7)':'rgba(255,255,255,0.35)'}
  function gp(e){const r=canvas.getBoundingClientRect();if(e.touches)return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};return{x:e.clientX-r.left,y:e.clientY-r.top}}
  canvas.addEventListener('mousedown',e=>{isDrawing=true;drawPts=[gp(e)];trailFade=1;try{getAC()}catch(e){}});
  canvas.addEventListener('mousemove',e=>{if(!isDrawing)return;const p=gp(e);const l=drawPts[drawPts.length-1];if(Math.hypot(p.x-l.x,p.y-l.y)>4)drawPts.push(p)});
  canvas.addEventListener('mouseup',()=>{isDrawing=false;drawPts.length>12?check():(drawPts=[],trailFade=1)});
  canvas.addEventListener('touchstart',e=>{e.preventDefault();isDrawing=true;drawPts=[gp(e)];trailFade=1;try{getAC()}catch(e){}},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!isDrawing)return;const p=gp(e);const l=drawPts[drawPts.length-1];if(Math.hypot(p.x-l.x,p.y-l.y)>4)drawPts.push(p)},{passive:false});
  canvas.addEventListener('touchend',()=>{isDrawing=false;drawPts.length>12?check():(drawPts=[],trailFade=1)});
  function check(){
    // Try each symbol in order
    for(const[key,sym] of Object.entries(SYMBOLS)){
      if(sym.check(drawPts)){
        const dest=SYMBOL_MAP[key];
        if(!dest)continue; // symbol not mapped, treat as fail
        setFeed('',true);sucAnim=0;sucAnimating=true;
        [288,360,432,540].forEach((f,i)=>playTone(f,0.07,i*0.13,1.2));
        haptic([15,25,50,25,100]);
        setTimeout(()=>navigate(dest),1100);
        return;
      }
    }
    // Nothing matched
    setFeed('',false);failAnim=0;failAnimating=true;haptic([15,20,15]);
    setTimeout(()=>{drawPts=[];trailFade=1;setFeed('')},1100);
  }
  function navigate(dest){
    if(dest==='orb')showScreen('orb-screen');
    else if(dest==='heart')showScreen('heart-screen');
    else if(dest==='star')showScreen('star-screen');
    else if(dest==='infinity')showScreen('infinity-screen');
  }
  (function loop(){
    if(!document.getElementById('login-screen').classList.contains('active')){requestAnimationFrame(loop);return}
    requestAnimationFrame(loop);bp+=0.018;
    ctx.fillStyle='#02010e';ctx.fillRect(0,0,390,844);
    [[80,200,160,260,0.04],[310,400,140,200,0.032],[185,100,100,280,0.036]].forEach(([x,y,r,h,a])=>{const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,`hsla(${h},60%,38%,${a})`);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,390,844)});
    const cx=195,cy=390,R=100,br=0.5+0.5*Math.sin(bp*0.7);
    // Mystery: no symbol guide shown. Animate the breathing text opacity.
    const mAlpha=0.2+0.2*Math.sin(bp*0.6);
    mysteryEl.style.opacity=mAlpha;
    if(drawPts.length>1){if(!isDrawing)trailFade=Math.max(0,trailFade-0.015);ctx.save();ctx.globalAlpha=trailFade;ctx.beginPath();ctx.moveTo(drawPts[0].x,drawPts[0].y);for(let i=1;i<drawPts.length;i++)ctx.lineTo(drawPts[i].x,drawPts[i].y);ctx.strokeStyle='rgba(215,195,255,0.92)';ctx.lineWidth=3;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();ctx.restore();if(trailFade<=0&&!isDrawing){drawPts=[];trailFade=1}}
    if(sucAnimating){sucAnim+=0.022;const t=Math.min(sucAnim,1);ctx.beginPath();ctx.arc(cx,cy,Math.max(0,R*(0.7+t*0.9)),0,Math.PI*2);ctx.strokeStyle=`rgba(140,220,160,${(1-t)*0.7})`;ctx.lineWidth=2;ctx.stroke();if(t>=1)sucAnimating=false}
    if(failAnimating){failAnim+=0.06;if(failAnim>=1)failAnimating=false;const shk=Math.sin(failAnim*Math.PI*6)*(1-failAnim)*8;ctx.save();ctx.translate(shk,0);ctx.beginPath();ctx.arc(cx,cy,Math.max(0,R*0.85),0,Math.PI*2);ctx.strokeStyle=`rgba(255,100,80,${(1-failAnim)*0.4})`;ctx.lineWidth=1.5;ctx.stroke();ctx.restore()}
  })();
})();

// ŌöĆŌöĆ ORB ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
(function(){
  const canvas=document.getElementById('orb-canvas');const ctx=canvas.getContext('2d');
  const W=390,H=844,CX=195,CY=410;

  // Stars: spherically placed for parallax, with colour tints
  const STAR_COLORS=[
    [255,255,255],[220,230,255],[255,220,200],[200,220,255],
    [255,240,180],[200,255,220],[255,200,220]
  ];
  let stars=Array.from({length:340},()=>{
    const col=STAR_COLORS[Math.floor(Math.random()*STAR_COLORS.length)];
    return{
      ax:Math.random()*Math.PI*2,
      ay:(Math.random()-0.5)*Math.PI,
      s:Math.random()*2.2+0.2,
      baseA:Math.random()*0.7+0.15,
      t:Math.random()*Math.PI*2,
      sp:Math.random()*0.012+0.003,
      col,
      // some stars bigger and brighter
      bright:Math.random()<0.12
    }
  });
  const neb=[[80,250,200,220,0.08],[320,560,170,200,0.07],[200,120,140,260,0.075],[90,620,150,240,0.06],[310,180,120,280,0.065]];

  const GEM_POS=[];const phi=Math.PI*(3-Math.sqrt(5));
  for(let i=0;i<9;i++){const y=1-(i/8)*2;const r=Math.sqrt(Math.max(0,1-y*y));GEM_POS.push({x:Math.cos(phi*i)*r,y,z:Math.sin(phi*i)*r})}

  // Word positions on sphere (same as before, used for hit detection)

  let rX=0.3,rY=0.5,vX=0,vY=0.004;
  let isDrag=false,lX=0,lY=0;
  let bp=0,holdTgt=-1,holdProg=0,holdTmr=null,gemPos=[];
  let frozen=false;

  function rot3(px,py,pz){let x=px,y=py,z=pz;const cy=Math.cos(rY),sy=Math.sin(rY);let nx=x*cy-z*sy,nz=x*sy+z*cy;x=nx;z=nz;const cx2=Math.cos(rX),sx=Math.sin(rX);let ny=y*cx2-z*sx;nz=y*sx+z*cx2;return{x,y:ny,z:nz}}

  function drawGalaxy(){
    ctx.fillStyle='#01000c';ctx.fillRect(0,0,W,H);
    neb.forEach(([x,y,r,h,a])=>{const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,`hsla(${h},65%,32%,${a})`);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H)});
    stars.forEach(s=>{
      s.t+=s.sp;
      // Parallax: project star using orb rotation offset
      const px=Math.cos(s.ax+rY*0.28)*Math.cos(s.ay+rX*0.20);
      const py=Math.sin(s.ay+rX*0.20);
      const pz=Math.sin(s.ax+rY*0.28)*Math.cos(s.ay+rX*0.20);
      const screenX=CX+px*(W*0.58);
      const screenY=CY-py*(H*0.58);
      if(screenX<-30||screenX>W+30||screenY<-30||screenY>H+30)return;
      // Vary brightness with twinkle + depth
      const depth=pz*0.5+0.5;
      const twinkle=0.45+0.55*Math.sin(s.t);
      const alpha=s.baseA*twinkle*(0.4+depth*0.6);
      const size=s.bright?s.s*1.8:s.s;
      const[cr,cg,cb]=s.col;
      // Bright stars get a small glow
      if(s.bright&&alpha>0.3){
        const glow=ctx.createRadialGradient(screenX,screenY,0,screenX,screenY,size*3);
        glow.addColorStop(0,`rgba(${cr},${cg},${cb},${alpha*0.35})`);
        glow.addColorStop(1,'rgba(0,0,0,0)');
        ctx.beginPath();ctx.arc(screenX,screenY,Math.max(0,size*3),0,Math.PI*2);ctx.fillStyle=glow;ctx.fill();
      }
      ctx.beginPath();ctx.arc(screenX,screenY,Math.max(0,size*twinkle),0,Math.PI*2);
      ctx.fillStyle=`rgba(${cr},${cg},${cb},${alpha})`;ctx.fill();
    });
  }

  function drawShell(br){
    const R=150;
    // Multiple outer glow rings ŌĆö stronger
    for(let i=5;i>=0;i--){
      const sc=1+i*0.065;
      const al=i===0?(0.28+br*0.14):(0.07+br*0.05)/(i+0.4);
      ctx.beginPath();ctx.arc(CX,CY,R*sc,0,Math.PI*2);
      ctx.strokeStyle=`rgba(175,200,255,${al})`;ctx.lineWidth=i===0?2.5:0.8;ctx.stroke();
    }
    // Glass body
    const body=ctx.createRadialGradient(CX-R*0.32,CY-R*0.38,R*0.04,CX,CY,R);
    body.addColorStop(0,`rgba(215,232,255,${0.20+br*0.12})`);
    body.addColorStop(0.2,`rgba(165,195,255,${0.12+br*0.07})`);
    body.addColorStop(0.55,`rgba(105,145,245,${0.06+br*0.03})`);
    body.addColorStop(1,`rgba(70,100,220,${0.03})`);
    ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.fillStyle=body;ctx.fill();
    // STRONG breathing inner light
    const pulse=0.5+0.5*Math.sin(bp*0.5);
    const innerR=R*0.65;
    const inner=ctx.createRadialGradient(CX,CY,0,CX,CY,innerR);
    inner.addColorStop(0,`rgba(190,165,255,${0.45+pulse*0.35})`);
    inner.addColorStop(0.25,`rgba(160,135,245,${0.28+pulse*0.22})`);
    inner.addColorStop(0.55,`rgba(120,95,215,${0.12+pulse*0.10})`);
    inner.addColorStop(1,'rgba(80,55,175,0)');
    ctx.beginPath();ctx.arc(CX,CY,Math.max(0,innerR),0,Math.PI*2);ctx.fillStyle=inner;ctx.fill();
    // Outer ambient glow from the light inside
    const outerGlow=ctx.createRadialGradient(CX,CY,R*0.5,CX,CY,R*1.3);
    outerGlow.addColorStop(0,'rgba(0,0,0,0)');
    outerGlow.addColorStop(0.7,`rgba(140,110,255,${0.04+pulse*0.04})`);
    outerGlow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(CX,CY,Math.max(0,R*1.3),0,Math.PI*2);ctx.fillStyle=outerGlow;ctx.fill();
    // Secondary pulse ring
    ctx.beginPath();ctx.arc(CX,CY,Math.max(0,R*(0.38+pulse*0.09)),0,Math.PI*2);
    ctx.strokeStyle=`rgba(210,190,255,${0.15+pulse*0.18})`;ctx.lineWidth=1.2;ctx.stroke();
    // Specular
    const spec=ctx.createRadialGradient(CX-R*0.3,CY-R*0.35,0,CX-R*0.3,CY-R*0.35,R*0.44);
    spec.addColorStop(0,`rgba(255,255,255,${0.22+br*0.12})`);spec.addColorStop(0.35,`rgba(225,238,255,0.06)`);spec.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.fillStyle=spec;ctx.fill();
    // Rim
    ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);
    ctx.strokeStyle=`rgba(215,228,255,${0.22+br*0.12})`;ctx.lineWidth=1.5;ctx.stroke();
  }

  function drawWord(sx,sy,r,v,depth,gemIdx){
    // Floating word ŌĆö no gem shape, just the value name with colour & glow
    const alpha=Math.max(0.08,(depth+1)/2);
    const pulse=1+Math.sin(bp*0.9+gemIdx*0.7)*0.04;
    const fs=Math.max(11,r*0.38)*pulse;
    ctx.save();
    ctx.globalAlpha=alpha;
    // Soft coloured halo behind text
    const glow=ctx.createRadialGradient(sx,sy,0,sx,sy,r*1.1);
    glow.addColorStop(0,hexA(v.h2,0.22*alpha));
    glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(sx,sy,Math.max(0,r*1.1),0,Math.PI*2);
    ctx.fillStyle=glow;ctx.fill();
    // Text
    ctx.globalAlpha=Math.min(1,alpha*1.7);
    ctx.font=`italic ${fs}px 'IM Fell English',Georgia,serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    // Subtle shadow for depth
    ctx.shadowColor=hexA(v.h1,0.6*alpha);
    ctx.shadowBlur=8;
    ctx.fillStyle=`rgba(255,248,220,${Math.min(1,alpha*1.8)})`;
    ctx.fillText(v.name,sx,sy);
    ctx.shadowBlur=0;
    ctx.restore();
  }

  function drawGems(){
    const R=152; // slightly larger orbit so words clear the orb shell
    const proj=VALUES.map((v,i)=>{const p=GEM_POS[i];const r3=rot3(p.x,p.y,p.z);return{sx:CX+r3.x*R,sy:CY-r3.y*R,sz:r3.z,i}}).sort((a,b)=>a.sz-b.sz);
    gemPos=new Array(9);
    proj.forEach(({sx,sy,sz,i})=>{
      const sc=(sz+1.8)/2.8;
      const r=70*sc; // hit radius for touch
      gemPos[i]={sx,sy,r,visible:sz>-0.45};
      if(sz>-0.6)drawWord(sx,sy,r,VALUES[i],sz,i);
    });
  }

  function drawArc(){
    if(holdTgt<0||holdProg<=0)return;
    const g=gemPos[holdTgt];if(!g||!g.visible)return;
    const v=VALUES[holdTgt];
    const gl=ctx.createRadialGradient(g.sx,g.sy,0,g.sx,g.sy,g.r*2.2);
    gl.addColorStop(0,hexA(v.h2,0.24*holdProg));gl.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(g.sx,g.sy,Math.max(0,g.r*2.2),0,Math.PI*2);ctx.fillStyle=gl;ctx.fill();
    ctx.beginPath();ctx.arc(g.sx,g.sy,g.r*1.5,-Math.PI/2,-Math.PI/2+Math.PI*2*holdProg);
    ctx.strokeStyle='rgba(255,232,120,0.95)';ctx.lineWidth=3;ctx.lineCap='round';ctx.stroke();
  }

  function hitGem(x,y){let best=-1,bd=Infinity;gemPos.forEach((g,i)=>{if(!g||!g.visible)return;const d=Math.hypot(x-g.sx,y-g.sy);if(d<g.r*1.8&&d<bd){bd=d;best=i}});return best}
  function startHold(i){holdTgt=i;holdProg=0;frozen=true;vX=0;vY=0;const t0=performance.now();holdTmr=setInterval(()=>{holdProg=Math.min(1,(performance.now()-t0)/900);if(holdProg>=1){clearInterval(holdTmr);holdTmr=null;openContent(i)}},16)}
  function cancelHold(){if(holdTmr){clearInterval(holdTmr);holdTmr=null}holdTgt=-1;holdProg=0;frozen=false;vY=0.003}
  function openContent(i){
    haptic([20,40,80]);[288,360,432].forEach((f,j)=>playTone(f,0.07,j*0.13,1.4));
    crossfadeTo('content',0.6);
    showScreen('content-screen');startContent(i);
  }
  function gp(e){const r=canvas.getBoundingClientRect();if(e.touches)return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};return{x:e.clientX-r.left,y:e.clientY-r.top}}

  // Drag vs hold: use a distance threshold before committing
  let _downX=0,_downY=0,_pointerDown=false,_pendingGem=-1,_dragging=false;
  const DRAG_THRESH=8; // px movement before we consider it a drag

  function onPointerDown(e){
    const p=gp(e);
    _pointerDown=true;_dragging=false;
    _downX=p.x;_downY=p.y;lX=p.x;lY=p.y;
    vX=0;vY=0;
    _pendingGem=hitGem(p.x,p.y); // remember which gem was under finger
  }
  function onPointerMove(e){
    if(!_pointerDown)return;
    const p=gp(e);
    const moved=Math.hypot(p.x-_downX,p.y-_downY);
    if(!_dragging&&moved>DRAG_THRESH){
      // Committed to drag ŌĆö cancel any pending hold
      _dragging=true;_pendingGem=-1;cancelHold();
    }
    if(_dragging){
      isDrag=true;
      const dx=p.x-lX,dy=p.y-lY;
      rY+=dx*0.009;rX-=dy*0.009;
      vY=dx*0.009;vX=-dy*0.009;
    }
    lX=p.x;lY=p.y;
  }
  function onPointerUp(){
    if(_pointerDown&&!_dragging&&_pendingGem>=0){
      // Short tap on a word ŌĆö start hold timer
      startHold(_pendingGem);
      // Hold timer will open content when complete
      // If user lifts finger again before timer fires, cancel
      // (hold requires sustained press ŌĆö for tap-to-open we need a different gesture)
      // Actually for floating words, single-tap opens directly:
      cancelHold();
      openContent(_pendingGem);
    } else {
      cancelHold();
    }
    _pointerDown=false;_dragging=false;isDrag=false;
  }
  function onPointerCancel(){_pointerDown=false;_dragging=false;isDrag=false;cancelHold();}

  canvas.addEventListener('mousedown',e=>{onPointerDown(e)});
  canvas.addEventListener('mousemove',e=>{onPointerMove(e)});
  canvas.addEventListener('mouseup',()=>{onPointerUp()});
  canvas.addEventListener('mouseleave',()=>{onPointerCancel()});
  canvas.addEventListener('touchstart',e=>{e.preventDefault();onPointerDown(e)},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();onPointerMove(e)},{passive:false});
  canvas.addEventListener('touchend',e=>{e.preventDefault();onPointerUp()},{passive:false});
  canvas.addEventListener('touchcancel',()=>{onPointerCancel()});
  document.getElementById('orb-back').addEventListener('click',()=>{cancelHold();crossfadeTo('login',0.5);showScreen('login-screen')});

  (function loop(){
    requestAnimationFrame(loop);
    if(!document.getElementById('orb-screen').classList.contains('active'))return;
    bp+=0.018;
    if(!isDrag&&!frozen){rY+=vY;rX+=vX;vX*=0.96;vY*=0.997;if(Math.abs(vY)<0.003)vY=0.003}
    const br=0.5+0.5*Math.sin(bp*0.7);
    drawGalaxy();drawShell(br);drawGems();drawArc();
  })();
})();

// ŌöĆŌöĆ CONTENT ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
let _stopContent=null;
function startContent(idx){
  if(_stopContent)_stopContent();
  const v=VALUES[idx];
  const canvas=document.getElementById('content-canvas');const ctx=canvas.getContext('2d');
  const gemBtn=document.getElementById('content-gem-btn');
  const gemInner=document.getElementById('content-gem-inner');
  const nameEl=document.getElementById('content-value-name');
  const sentEl=document.getElementById('sentence-text');
  const restartEl=document.getElementById('restart-text');

  gemInner.style.background=v.h1;
  gemBtn.style.boxShadow=`0 0 30px ${v.h2}aa`;
  nameEl.textContent=v.name;
  restartEl.style.color='rgba(255,255,255,0)';
  sentEl.style.color='rgba(255,255,255,0)';

  const sentences=v.sentences;
  const[dr,dg,db]=hexArr(v.dark);
  const[h1r,h1g,h1b]=hexArr(v.h1);
  const[h2r,h2g,h2b]=hexArr(v.h2);
  const cStars=Array.from({length:55},()=>({x:Math.random()*390,y:Math.random()*500,s:Math.random()*1.1+0.2,a:Math.random()*0.4+0.15,t:Math.random()*Math.PI*2,sp:Math.random()*0.01+0.005}));
  let aPhase=0,running=true,raf=null;
  let sentIdx=0,sentOpacity=0,restartOpacity=0;
  let fadePhase='in',fadeProgress=0;
  const FADE_IN=1.2,HOLD=7.0,FADE_OUT=1.2;
  let lastTs=null,advancing=false,atEnd=false;

  sentEl.textContent=sentences[0];

  const contentScreen=document.getElementById('content-screen');
  function onContentClick(e){
    if(e.target===gemBtn||e.target===gemInner)return;
    if(atEnd){
      // Restart from beginning
      atEnd=false;restartOpacity=0;restartEl.style.color='rgba(255,255,255,0)';
      sentIdx=0;sentEl.textContent=sentences[0];fadePhase='in';fadeProgress=0;advancing=false;
    } else {
      advancing=true;
    }
  }
  contentScreen.addEventListener('click',onContentClick);
  contentScreen.addEventListener('touchend',e=>{if(!e.defaultPrevented)onContentClick(e)},{passive:true});

  function drawAurora(){
    aPhase+=0.008;ctx.fillStyle=v.dark;ctx.fillRect(0,0,390,844);
    for(let band=0;band<5;band++){
      const yB=844*(0.05+band*0.13);const amp=844*(0.038+band*0.016);
      ctx.beginPath();for(let px=0;px<=390;px+=3){const w=Math.sin(px/390*Math.PI*3+aPhase+band*1.2)*amp+Math.sin(px/390*Math.PI*5+aPhase*0.6+band)*amp*0.32;px===0?ctx.moveTo(px,yB+w):ctx.lineTo(px,yB+w)}
      for(let px=390;px>=0;px-=3){const w=Math.sin(px/390*Math.PI*3+aPhase+band*1.2)*amp+Math.sin(px/390*Math.PI*5+aPhase*0.6+band)*amp*0.32;ctx.lineTo(px,yB+w+844*0.085)}
      ctx.closePath();const al=(0.085-band*0.01)*(0.7+0.3*Math.sin(aPhase+band));
      ctx.fillStyle=`rgba(${h1r},${h1g},${h1b},${al})`;ctx.fill();
      ctx.strokeStyle=`rgba(${h2r},${h2g},${h2b},${al*0.3})`;ctx.lineWidth=0.5;ctx.stroke();
    }
    const gh=844*0.28;const ground=ctx.createLinearGradient(0,844-gh,0,844);
    ground.addColorStop(0,'rgba(0,0,0,0)');
    ground.addColorStop(0.3,`rgba(${Math.max(0,dr+5)},${Math.max(0,dg+8)},${Math.max(0,db+4)},0.65)`);
    ground.addColorStop(1,`rgba(${dr},${dg},${db},0.98)`);
    ctx.fillStyle=ground;ctx.fillRect(0,844-gh,390,gh);
    cStars.forEach(s=>{s.t+=s.sp;const tw=0.55+0.45*Math.sin(s.t);ctx.beginPath();ctx.arc(s.x,s.y,Math.max(0,s.s*tw),0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.a*tw})`;ctx.fill()});
  }

  function step(ts){
    if(!running)return;
    drawAurora();
    const dt=lastTs?Math.min((ts-lastTs)/1000,0.1):0;lastTs=ts;

    if(atEnd){
      // Show "begin again" fading in
      restartOpacity=Math.min(1,restartOpacity+dt/1.5);
      restartEl.style.color=`rgba(255,255,255,${restartOpacity*0.55})`;
      sentEl.style.color='rgba(255,255,255,0)';
      raf=requestAnimationFrame(step);return;
    }

    if(advancing&&fadePhase!=='out'){fadePhase='out';fadeProgress=0;}

    if(fadePhase==='in'){
      fadeProgress+=dt/FADE_IN;if(fadeProgress>=1){fadeProgress=1;fadePhase='hold'}
      sentOpacity=fadeProgress;
    } else if(fadePhase==='hold'){
      sentOpacity=1;
    } else {
      fadeProgress+=dt/FADE_OUT;sentOpacity=Math.max(0,1-fadeProgress);
      if(fadeProgress>=1){
        advancing=false;
        if(sentIdx===sentences.length-1){
          // End reached ŌĆö show restart prompt
          atEnd=true;sentEl.style.color='rgba(255,255,255,0)';
          raf=requestAnimationFrame(step);return;
        }
        sentIdx++;sentEl.textContent=sentences[sentIdx];
        fadePhase='in';fadeProgress=0;
      }
    }
    sentEl.style.color=`rgba(255,255,255,${sentOpacity*0.88})`;
    sentEl.style.textShadow=`0 0 ${50*sentOpacity}px rgba(${h2r},${h2g},${h2b},${sentOpacity*0.4})`;
    raf=requestAnimationFrame(step);
  }
  raf=requestAnimationFrame(step);

  function onGemClick(e){e.stopPropagation();if(_stopContent)_stopContent();crossfadeTo('ambient',0.55);showScreen('orb-screen')}
  gemBtn.addEventListener('click',onGemClick);
  gemBtn.addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();onGemClick(e)},{passive:false});

  _stopContent=function(){
    running=false;if(raf)cancelAnimationFrame(raf);
    sentEl.textContent='';sentEl.style.color='rgba(255,255,255,0)';
    restartEl.style.color='rgba(255,255,255,0)';
    lastTs=null;atEnd=false;
    contentScreen.removeEventListener('click',onContentClick);
    contentScreen.removeEventListener('touchend',onContentClick);
    gemBtn.removeEventListener('click',onGemClick);
    gemBtn.removeEventListener('touchend',onGemClick);
    _stopContent=null;
  };
}

(function(){
  const MSG=`Add your favourite image\nor personal message here.\n\nThis space is yours.`;
  const msgEl=document.getElementById('infinity-msg');
  const screen=document.getElementById('infinity-screen');
  const backBtn=document.getElementById('infinity-back');

  // Add subtle star field to infinity screen
  const canvas=document.createElement('canvas');
  canvas.width=390;canvas.height=844;
  canvas.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;z-index:0';

    stars.forEach(s=>{s.t+=s.sp;const tw=0.5+0.5*Math.sin(s.t);ctx.beginPath();ctx.arc(s.x,s.y,Math.max(0,s.s*tw),0,Math.PI*2);ctx.fillStyle=`rgba(200,195,255,${s.a*tw})`;ctx.fill()});
    requestAnimationFrame(drawInfinity);
  }

  msgEl.textContent=MSG;

  const obs=new MutationObserver(()=>{
    if(screen.classList.contains('active')){running=true;drawInfinity();}
    else running=false;
  });
  obs.observe(screen,{attributes:true,attributeFilter:['class']});
})();
